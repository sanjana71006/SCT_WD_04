<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaskNest - Smart To-Do List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-tasks"></i>
                    <h1>TaskNest</h1>
                </div>
                <p class="tagline">Organize your tasks, achieve your goals</p>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <main class="app-main">
            <section class="tasks-section">
                <div class="section-header">
                    <h2><i class="fas fa-list-check"></i> My Tasks</h2>
                    <div class="filter-controls">
                        <select id="categoryFilter" class="filter-select">
                            <option value="all">All Categories</option>
                            <option value="work">Work</option>
                            <option value="personal">Personal</option>
                            <option value="shopping">Shopping</option>
                            <option value="health">Health</option>
                            <option value="education">Education</option>
                        </select>
                        <select id="priorityFilter" class="filter-select">
                            <option value="all">All Priorities</option>
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                </div>
                
                <div class="tasks-container" id="tasksContainer">
                    <div class="no-tasks">
                        <div class="no-tasks-icon">
                            <i class="fas fa-cloud"></i>
                        </div>
                        <h3>No tasks yet</h3>
                        <p>Tap the + button to add your first task</p>
                    </div>
                </div>
            </section>

            <button class="add-task-btn floating-btn" id="addTaskBtn">
                <i class="fas fa-plus"></i>
            </button>

            <div class="modal" id="taskModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 id="modalTitle">Add New Task</h3>
                        <span class="close-btn" id="closeModalBtn">&times;</span>
                    </div>
                    
                    <div class="modal-body">
                        <div class="form-group">
                            <label for="taskTitle">Task Title*</label>
                            <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="taskPriority">Priority</label>
                                <div class="priority-selector">
                                    <button class="priority-option high" data-value="high">
                                        <span class="priority-dot"></span> High
                                    </button>
                                    <button class="priority-option medium active" data-value="medium">
                                        <span class="priority-dot"></span> Medium
                                    </button>
                                    <button class="priority-option low" data-value="low">
                                        <span class="priority-dot"></span> Low
                                    </button>
                                </div>
                                <input type="hidden" id="taskPriority" value="medium">
                            </div>
                            
                            <div class="form-group">
                                <label for="taskCategory">Category</label>
                                <select id="taskCategory">
                                    <option value="work">Work</option>
                                    <option value="personal">Personal</option>
                                    <option value="shopping">Shopping</option>
                                    <option value="health">Health</option>
                                    <option value="education">Education</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="taskDueDate">Due Date</label>
                                <input type="date" id="taskDueDate">
                            </div>
                            
                            <div class="form-group">
                                <label for="taskDueTime">Due Time</label>
                                <input type="time" id="taskDueTime">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="taskNotes">Notes</label>
                            <textarea id="taskNotes" rows="3" placeholder="Additional details..."></textarea>
                        </div>
                    </div>
                    
                    <div class="modal-footer">
                        <button class="btn secondary" id="cancelTaskBtn">Cancel</button>
                        <button class="btn primary" id="saveTaskBtn">Add Task</button>
                        <button class="btn primary" id="updateTaskBtn" style="display: none;">Update Task</button>
                    </div>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <p>© <span id="currentYear"></span> TaskNest | Organize your life</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
